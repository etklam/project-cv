services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: project_cv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_cv"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/project_cv
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: dev-secret-32-bytes-minimum-key-x
      APP_UPLOAD_PATH: /app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_PROXY_TARGET: http://backend:8080
      BACKEND_UPSTREAM: backend:8080
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4173:80"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -q -O /dev/null http://127.0.0.1/ || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  pdf-renderer:
    build:
      context: ./services/pdf-renderer
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      PORT: 3100
    ports:
      - "3100:3100"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:3100/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
  backend-data:
