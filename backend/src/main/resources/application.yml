spring:
  application:
    name: project-cv-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/project_cv}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET:dev-secret-key-32-bytes-long-for-hs256-signing}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours

app:
  upload:
    path: ${APP_UPLOAD_PATH:./data/uploads}
  credit:
    sign-up-bonus: ${APP_CREDIT_SIGN_UP_BONUS:50}
    create-cv-cost: ${APP_CREDIT_CREATE_CV_COST:10}
    pdf-export-cost: ${APP_CREDIT_PDF_EXPORT_COST:15}
  export:
    renderer-base-url: ${APP_EXPORT_RENDERER_BASE_URL:http://localhost:3100}
    frontend-base-url: ${APP_EXPORT_FRONTEND_BASE_URL:http://localhost:5173}
  reward:
    invite:
      inviter-bonus: ${APP_REWARD_INVITE_INVITER_BONUS:20}
      invitee-bonus: ${APP_REWARD_INVITE_INVITEE_BONUS:20}
