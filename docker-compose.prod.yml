services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: project_cv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_cv"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - internal

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/project_cv
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_UPLOAD_PATH: /app/data/uploads
      APP_EXPORT_RENDERER_BASE_URL: http://pdf-renderer:3100
      APP_EXPORT_FRONTEND_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_PROXY_TARGET: http://backend:8080
      BACKEND_UPSTREAM: ${APP_BACKEND_UPSTREAM:-backend:8080}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:5173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

  pdf-renderer:
    build:
      context: ./services/pdf-renderer
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      PORT: 3100
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:3100/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres-data:
  backend-data:

networks:
  internal:
    driver: bridge
